active_model = "mistral-medium-3.5"
system_prompt_id = "cli"

[project_context]
max_chars = 40000
default_commit_count = 5
max_doc_bytes = 32768

[session_logging]
enabled = true

[tools.bash]
permission = "ask"

[tools.edit]
permission = "ask"

[tools.read_file]
permission = "always"

[tools.write_file]
permission = "always"

[tools.grep]
permission = "always"
